<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — Java Powered</title>
  <meta name="description" content="Full-stack calculator: HTML/CSS frontend connected to Java Spring Boot backend via REST API." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Small badge to show this is the Java-powered version -->
  <style>
    .api-badge {
      position: fixed; top: 14px; left: 18px; z-index: 99;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff; font-family: 'Inter', sans-serif; font-size: 11px;
      font-weight: 600; padding: 5px 12px; border-radius: 50px;
      letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(34,197,94,0.35);
    }
    .api-badge.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
  </style>
</head>
<body>
  <div class="api-badge" id="api-badge">⚡ Java API</div>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="calculator-wrapper">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-standard" onclick="setMode('standard')">Standard</button>
      <button class="mode-btn" id="btn-scientific" onclick="setMode('scientific')">Scientific</button>
    </div>

    <div class="calculator" id="calculator">
      <div class="display" id="display">
        <div class="history-display" id="history-display"></div>
        <div class="main-display" id="main-display">0</div>
      </div>

      <div class="sci-panel" id="sci-panel">
        <button class="btn btn-sci" id="btn-sin"   onclick="sciOp('sin')">sin</button>
        <button class="btn btn-sci" id="btn-cos"   onclick="sciOp('cos')">cos</button>
        <button class="btn btn-sci" id="btn-tan"   onclick="sciOp('tan')">tan</button>
        <button class="btn btn-sci" id="btn-log"   onclick="sciOp('log')">log</button>
        <button class="btn btn-sci" id="btn-ln"    onclick="sciOp('ln')">ln</button>
        <button class="btn btn-sci" id="btn-sqrt"  onclick="sciOp('sqrt')">√x</button>
        <button class="btn btn-sci" id="btn-pow2"  onclick="sciOp('pow2')">x²</button>
        <button class="btn btn-sci" id="btn-pow3"  onclick="sciOp('pow3')">x³</button>
        <button class="btn btn-sci" id="btn-pow"   onclick="inputOp('^')">xʸ</button>
        <button class="btn btn-sci" id="btn-inv"   onclick="sciOp('inv')">1/x</button>
        <button class="btn btn-sci" id="btn-fact"  onclick="sciOp('fact')">n!</button>
        <button class="btn btn-sci" id="btn-pi"    onclick="inputConst('π')">π</button>
        <button class="btn btn-sci" id="btn-e"     onclick="inputConst('e')">e</button>
        <button class="btn btn-sci" id="btn-abs"   onclick="sciOp('abs')">|x|</button>
        <button class="btn btn-sci" id="btn-paren" onclick="inputParen()">( )</button>
        <button class="btn btn-sci" id="btn-deg"   onclick="toggleAngle()">DEG</button>
      </div>

      <div class="btn-grid" id="btn-grid">
        <button class="btn btn-util" id="btn-mc"  onclick="memOp('MC')">MC</button>
        <button class="btn btn-util" id="btn-mr"  onclick="memOp('MR')">MR</button>
        <button class="btn btn-util" id="btn-mpl" onclick="memOp('M+')">M+</button>
        <button class="btn btn-util" id="btn-mmi" onclick="memOp('M-')">M−</button>

        <button class="btn btn-func" id="btn-ac"  onclick="clearAll()">AC</button>
        <button class="btn btn-func" id="btn-pm"  onclick="toggleSign()">+/−</button>
        <button class="btn btn-func" id="btn-pct" onclick="percent()">%</button>
        <button class="btn btn-op"   id="btn-div" onclick="inputOp('÷')">÷</button>

        <button class="btn btn-num" id="btn-7" onclick="inputDigit('7')">7</button>
        <button class="btn btn-num" id="btn-8" onclick="inputDigit('8')">8</button>
        <button class="btn btn-num" id="btn-9" onclick="inputDigit('9')">9</button>
        <button class="btn btn-op"  id="btn-mul" onclick="inputOp('×')">×</button>

        <button class="btn btn-num" id="btn-4" onclick="inputDigit('4')">4</button>
        <button class="btn btn-num" id="btn-5" onclick="inputDigit('5')">5</button>
        <button class="btn btn-num" id="btn-6" onclick="inputDigit('6')">6</button>
        <button class="btn btn-op"  id="btn-sub" onclick="inputOp('−')">−</button>

        <button class="btn btn-num" id="btn-1" onclick="inputDigit('1')">1</button>
        <button class="btn btn-num" id="btn-2" onclick="inputDigit('2')">2</button>
        <button class="btn btn-num" id="btn-3" onclick="inputDigit('3')">3</button>
        <button class="btn btn-op"  id="btn-add" onclick="inputOp('+')">+</button>

        <button class="btn btn-num btn-zero" id="btn-0" onclick="inputDigit('0')">0</button>
        <button class="btn btn-num" id="btn-dot" onclick="inputDot()">.</button>
        <button class="btn btn-eq"  id="btn-eq"  onclick="calculate()">=</button>
      </div>

      <div class="history-panel" id="history-panel">
        <div class="history-header">
          <span>History</span>
          <button id="btn-clear-hist" onclick="clearHistory()">Clear</button>
        </div>
        <ul class="history-list" id="history-list"></ul>
      </div>
      <button class="toggle-history-btn" id="toggle-history" onclick="toggleHistory()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        History
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Loads the API-connected version of the calculator logic -->
  <script src="calculator-api.js"></script>
</body>
</html>
