name: Java Calculator CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Build & Test ───────────────────────────────────────────────
  test:
    name: Build & Run JUnit 5 Tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # Cache ~/.m2 to speed up builds

      - name: 🔨 Build project (compile only)
        run: mvn -B compile --no-transfer-progress

      - name: 🧪 Run JUnit 5 tests
        run: mvn -B test --no-transfer-progress

      - name: 📊 Upload Surefire test reports
        if: always()            # Upload even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

  # ── Job 2: Package JAR (only on push to main/master) ─────────────────
  package:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: test                 # Only runs after tests pass

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Package JAR (skip tests — already ran in 'test' job)
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: 🚀 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/*.jar
          retention-days: 30